version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sprintos-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    networks:
      - sprintos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: sprintos-evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}

      # SQLITE
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=/sqlite/evolution.db

      # REDIS
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - evolution-store:/evolution/store
      - evolution-instances:/evolution/instances
      - ./database:/sqlite
    networks:
      - sprintos-network

volumes:
  redis-data:
    driver: local

  evolution-store:
    driver: local

  evolution-instances:
    driver: local

networks:
  sprintos-network:
    driver: bridge
