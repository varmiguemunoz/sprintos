name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Inject config values
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os

          def esc(v):
              return v.replace('\\', '\\\\').replace('"', '\\"')

          content = f'''package config

          import "os"

          var (
              DatabaseURL        = "{esc(os.environ.get('DATABASE_URL', ''))}"
              GitHubClientID     = "{esc(os.environ.get('GITHUB_CLIENT_ID', ''))}"
              GitHubClientSecret = "{esc(os.environ.get('GITHUB_CLIENT_SECRET', ''))}"
              SMTPHost           = "{esc(os.environ.get('SMTP_HOST', ''))}"
              SMTPPort           = "{esc(os.environ.get('SMTP_PORT', ''))}"
              SMTPFrom           = "{esc(os.environ.get('SMTP_FROM', ''))}"
              SMTPPassword       = "{esc(os.environ.get('SMTP_PASSWORD', ''))}"
          )

          func GetDatabaseURL() string {{
              if DatabaseURL != "" {{
                  return DatabaseURL
              }}
              return os.Getenv("DATABASE_URL")
          }}

          func GetGitHubClientID() string {{
              if GitHubClientID != "" {{
                  return GitHubClientID
              }}
              return os.Getenv("GITHUB_CLIENT_ID")
          }}

          func GetGitHubClientSecret() string {{
              if GitHubClientSecret != "" {{
                  return GitHubClientSecret
              }}
              return os.Getenv("GITHUB_CLIENT_SECRET")
          }}

          func GetSMTPHost() string {{
              if SMTPHost != "" {{
                  return SMTPHost
              }}
              return os.Getenv("SMTP_HOST")
          }}

          func GetSMTPPort() string {{
              if SMTPPort != "" {{
                  return SMTPPort
              }}
              return os.Getenv("SMTP_PORT")
          }}

          func GetSMTPFrom() string {{
              if SMTPFrom != "" {{
                  return SMTPFrom
              }}
              return os.Getenv("SMTP_FROM")
          }}

          func GetSMTPPassword() string {{
              if SMTPPassword != "" {{
                  return SMTPPassword
              }}
              return os.Getenv("SMTP_PASSWORD")
          }}
          '''

          with open('internal/config/config.go', 'w') as f:
              f.write(content)

          print("Config file generated successfully.")
          PYEOF

      - name: Build all platforms
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64  go build -o dist/sprintos-darwin-amd64     .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64  go build -o dist/sprintos-darwin-arm64     .
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64  go build -o dist/sprintos-linux-amd64      .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64  go build -o dist/sprintos-linux-arm64      .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64  go build -o dist/sprintos-windows-amd64.exe .

      - name: Calculate SHA256 checksums
        id: sha
        run: |
          cd dist
          sha256sum sprintos-darwin-amd64       > sprintos-darwin-amd64.sha256
          sha256sum sprintos-darwin-arm64       > sprintos-darwin-arm64.sha256
          sha256sum sprintos-linux-amd64        > sprintos-linux-amd64.sha256
          sha256sum sprintos-linux-arm64        > sprintos-linux-arm64.sha256
          sha256sum sprintos-windows-amd64.exe  > sprintos-windows-amd64.exe.sha256

          echo "SHA_DARWIN_AMD64=$(sha256sum sprintos-darwin-amd64 | awk '{print $1}')"       >> $GITHUB_OUTPUT
          echo "SHA_DARWIN_ARM64=$(sha256sum sprintos-darwin-arm64 | awk '{print $1}')"       >> $GITHUB_OUTPUT
          echo "SHA_LINUX_AMD64=$(sha256sum sprintos-linux-amd64 | awk '{print $1}')"         >> $GITHUB_OUTPUT
          echo "SHA_LINUX_ARM64=$(sha256sum sprintos-linux-arm64 | awk '{print $1}')"         >> $GITHUB_OUTPUT
          echo "SHA_WINDOWS_AMD64=$(sha256sum sprintos-windows-amd64.exe | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SprintOS ${{ steps.version.outputs.VERSION }}
          body: |
            ## Install SprintOS ${{ steps.version.outputs.VERSION }}

            ### macOS
            ```bash
            brew install varmiguemunoz/sprintos/sprintos
            ```

            ### Windows
            ```powershell
            scoop bucket add sprintos https://github.com/varmiguemunoz/scoop-sprintos
            scoop install sprintos
            ```

            ### Linux
            ```bash
            curl -fsSL https://raw.githubusercontent.com/varmiguemunoz/sprintos/main/install.sh | sh
            ```
          files: |
            dist/sprintos-darwin-amd64
            dist/sprintos-darwin-amd64.sha256
            dist/sprintos-darwin-arm64
            dist/sprintos-darwin-arm64.sha256
            dist/sprintos-linux-amd64
            dist/sprintos-linux-amd64.sha256
            dist/sprintos-linux-arm64
            dist/sprintos-linux-arm64.sha256
            dist/sprintos-windows-amd64.exe
            dist/sprintos-windows-amd64.exe.sha256

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA_AMD64=${{ steps.sha.outputs.SHA_DARWIN_AMD64 }}
          SHA_ARM64=${{ steps.sha.outputs.SHA_DARWIN_ARM64 }}
          BASE_URL="https://github.com/varmiguemunoz/sprintos/releases/download/${VERSION}"

          cat > /tmp/sprintos.rb << FORMULA
          class Sprintos < Formula
            desc "A fast, keyboard-driven project manager for your terminal"
            homepage "https://github.com/varmiguemunoz/sprintos"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/sprintos-darwin-arm64"
                sha256 "${SHA_ARM64}"
              else
                url "${BASE_URL}/sprintos-darwin-amd64"
                sha256 "${SHA_AMD64}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "sprintos-darwin-arm64" => "sprintos"
              else
                bin.install "sprintos-darwin-amd64" => "sprintos"
              end
            end

            test do
              system "#{bin}/sprintos", "--help"
            end
          end
          FORMULA

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/varmiguemunoz/homebrew-sprintos.git tap-repo
          mkdir -p tap-repo/Formula
          cp /tmp/sprintos.rb tap-repo/Formula/sprintos.rb
          cd tap-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/sprintos.rb
          git commit -m "Update sprintos to ${VERSION}"
          git push

      - name: Update Scoop manifest
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA=${{ steps.sha.outputs.SHA_WINDOWS_AMD64 }}
          BASE_URL="https://github.com/varmiguemunoz/sprintos/releases/download/${VERSION}"

          python3 -c "
          import json
          version = '${VERSION}'.lstrip('v')
          manifest = {
              'version': version,
              'description': 'A fast, keyboard-driven project manager for your terminal',
              'homepage': 'https://github.com/varmiguemunoz/sprintos',
              'license': 'MIT',
              'url': f'${BASE_URL}/sprintos-windows-amd64.exe',
              'hash': '${SHA}',
              'bin': [['sprintos-windows-amd64.exe', 'sprintos']],
              'checkver': {'github': 'https://github.com/varmiguemunoz/sprintos'},
              'autoupdate': {'url': 'https://github.com/varmiguemunoz/sprintos/releases/download/v\$version/sprintos-windows-amd64.exe'}
          }
          print(json.dumps(manifest, indent=2))
          " > /tmp/sprintos.json

          git clone https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/varmiguemunoz/scoop-sprintos.git scoop-repo
          mkdir -p scoop-repo/bucket
          cp /tmp/sprintos.json scoop-repo/bucket/sprintos.json
          cd scoop-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add bucket/sprintos.json
          git commit -m "Update sprintos to ${VERSION}"
          git push
